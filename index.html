<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<link rel="stylesheet" href="style.css">
<title>Subscription Manager</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Syne:wght@700;800&display=swap" rel="stylesheet"/>
</head>
<body>
  
<!-- ── MAIN CONTENT ── -->
<main class="main">

  <div class="page-header">
    <h1 class="page-title">Dashboard</h1>
    <div class="search">
      <input type="text" id="SearchInputID" class="SearchInput" placeholder="Search...">
      <button id="SearchbtnID" class="searchBtn"><img class="searchIcon" src="/loupe.png" alt=""></button>
      <button id="CancelbtnID" class="Cancelbtn">Cancel</button>
    </div>
  </div>

  <!-- Stats -->
  <div class="stats-grid">
    <div class="stat-card first">
      <div class="stat-label">Total Monthly Spending</div>
      <div class="stat-value" id="totalSpending">$0</div>
      <div class="stat-sub">
        <span class="badge-up">↑ 5%</span>
        vs last month
      </div>
    </div>

    <div class="stat-card second">
      <div class="stat-label">Active Subscriptions</div>
      <div class="stat-value" id="activeSubscriptions">0</div>
      <div class="stat-sub">Across 6 categories</div>
    </div>
    <div class="stat-card third">
      <div class="stat-label">Most Expensive Service</div>
      <div class="stat-value" id="mostExpensive">$0</div>
      <div id="mostExpensiveName"></div>
      <div class="stat-sub">
      </div>
    </div>
  </div>

  <!-- Subscriptions List -->
  <div class="section-header">
    <h2 class="section-title">Subscriptions List</h2>
    <div class="filter-tabs">
      <button class="filter-tab active">All</button>
      <button class="filter-tab">Streaming</button>
      <button class="filter-tab">Tools</button>
    </div>
    <button id="addSub" class="btn-add">
      <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      Add Subscription
    </button>
  </div>
  <div id="inputPart" class="inputSection">
  <div class="form">
  <div class="inputItem">
    <select name="apps" id="apps">
      <option value="Choose an App" disabled selected >Choose an App</option>
      <option value="Netflix">Netflix</option>
      <option value="ChatGPT">ChatGPT</option>
      <option value="Spotify">Spotify</option>
      <option value="Notion">Notion</option>
      <option value="Claude">Claude</option>
      <option value="Adobe CC">Adobe CC</option>
    </select>
    <input type="number" required placeholder="price" id="priceinput">
    <select name="billingCycle" id="billingCycleInput">
      <option value="Choose a billing cycle" disabled selected>Choose a billing cycle</option>
      <option value="Monthly">Monthly</option>
      <option value="Yearly">Yearly</option>
    </select>
    <div class="labelAndDate">
    <label for="start-date" class="start-date-label">Start Date</label>
    <input type="date" id="start-date" required>
    </div>
    <button id="submitSubscription" class="submit">Add Subscription</button>
    <button id="saveChanges" class="btn-add">
      <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      Save Changes
    </button>
  </div>
  </div>
  </div>
  <div id="errorEmpty">
    <div id="errormsg">Empty inputs are not allowed!</div>
  </div>
<div id="table-card" class="table-card">

  <div class="table-head">
    <div>ID</div>
    <div>App</div>
    <div>Price</div>
    <div>Billing Cycle</div>
    <div>Start Date</div>
    <div>Next Payment</div>
    <div>Edit</div>
    <div>Delete</div>
  </div>

  <!-- <div id="tableRow" class="table-row">
    <div class="app-cell">
      <div class="app-icon"></div>
      <div class="app-id"></div>
      <div>
        <div class="app-name">Netflix</div>
      </div>
    </div>

    <div class="price-cell">
      <span class="price">14.99</span><span class="unit">/mo</span>
    </div>

    <div><span class="cycle-pill cycle-monthly">Monthly</span></div>

    <div class="date-cell">25 Jun</div>
    
    <div class="next-payment date-soon">18 Jun</div>

    <div><button class="btn-edit">Edit</button></div>

    <div><button class="btn-delete">Delete</button></div>
  </div> -->

</div>

</main>

<script src="script.js"></script>
</body>
</html>
